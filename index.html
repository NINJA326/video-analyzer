<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NINJA AIRS VIDEO ANALYZER</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>NINJA AIRS VIDEO ANALYZER</h1>
  <span class="badge">V13 / 安定版</span>
</header>

<div class="app">
  <main class="stage">
    <div class="videoBox" id="videoBox">
      <video id="video" playsinline preload="metadata"></video>
      <div id="youtubePlayer"></div>
      <canvas id="draw"></canvas>
      <div class="floatText" id="floatText"></div>
      <div class="dropHint" id="dropHint">MP4を読み込み<br>または動画をここへドラッグ</div>
    </div>

    <div class="controls">
      <div class="sourceRow">
        <button id="modeMp4" class="modeBtn active">MP4動画</button>
        <button id="modeYoutube" class="modeBtn">YouTube URL</button>
        <label class="fileBtn" id="mp4Label">MP4読込<input id="file" type="file" accept="video/mp4,video/*"></label>
        <input id="youtubeUrl" type="text" placeholder="YouTube URLを貼り付け" hidden>
        <button id="youtubeLoad" hidden>YouTube読込</button>
      </div>

      <div class="transport">
        <div class="row">
          <button id="play">▶/⏸</button>
          <button id="back5">−5秒</button>
          <button id="fwd5">＋5秒</button>
        </div>
        <input id="seek" class="range" type="range" min="0" max="1000" value="0">
        <div class="time"><span id="cur">00:00.00</span> / <span id="dur">00:00.00</span></div>
      </div>
    </div>

    <div class="toolbar">
      <div class="group"><button id="frameBack">◀ 1コマ</button><button id="frameNext">1コマ ▶</button></div>
      <div class="group">
        <button data-rate="0.25">0.25x</button><button data-rate="0.5">0.5x</button>
        <button data-rate="1">1x</button><button data-rate="1.5">1.5x</button><button data-rate="2">2x</button>
      </div>
      <div class="group">
        <button id="pen" class="active">ペン</button><button id="line">直線</button>
        <button id="arrow">矢印</button><button id="circle">円</button><button id="rect">四角</button>
      </div>
      <div class="group"><button id="undo">元に戻す</button><button id="redo">やり直し</button><button id="clear">全消去</button></div>
      <div class="group">
        <button id="shot">画像保存</button>
        <select id="quality"><option value="light">軽量</option><option value="high" selected>高画質</option><option value="max">最高画質</option></select>
        <button id="recStart" class="red">● 録画開始</button><button id="ytScreenRec" class="red">● YouTube解説録画</button><button id="recStop" class="disabled">■ 録画終了</button>
      </div>
      <div class="group">
        <button id="saveProject" class="blue">保存</button><button id="loadProject">読込</button>
        <input id="projectFile" type="file" accept=".json">
      </div>
    </div>
  </main>

  <aside class="side">
    <div class="sideScroll">
      <h2>コメント・文字起こし</h2>
      <div class="row">
        <div class="playerPickerWrap" id="quickPlayerWrap">
          <button id="quickPlayerBtn">選手 ▾</button>
          <div class="playerPickerPanel">
            <div class="playerPickerHeader"><strong>選手選択</strong><button id="quickClear" type="button">選択解除</button></div>
            <input id="quickPlayerSearch" type="text" placeholder="選手検索">
            <div class="row">
              <button data-quick-roster="boys" type="button">男子</button>
              <button data-quick-roster="girls" type="button">女子</button>
              <button data-quick-roster="all" type="button">全員</button>
            </div>
            <div class="playerPickerList" id="quickPlayers"></div>
          </div>
        </div>
        <button id="openPlayers">一覧編集</button>
        <button id="mic">🎤 長押し入力</button>
      </div>

      <div class="selectedBox" id="selectedBox">未選択</div>
      <textarea id="memo" placeholder="コメントを入力..."></textarea>

      <div class="row">
        <button data-tag="OF">OF</button><button data-tag="DF">DF</button>
        <button data-tag="REB">REB</button><button data-tag="判断">判断</button><button data-tag="GOOD">GOOD</button>
      </div>

      <div class="row">
        <button id="showText">コメントを画面表示</button>
        <button id="saveScene" class="red">場面保存</button>
      </div>

      <div class="status" id="status">状態：待機中</div>
      <p class="small">YouTube URLは分析・解説用、MP4は高画質編集・保存用です。コメント表示後は3.5秒、ペン入力後は0.5秒で自動再開します。</p>

      <h2>場面一覧</h2>
      <div id="scenes"></div>
    </div>
  </aside>
</div>

<section class="drawer" id="drawer">
  <div class="row drawerHead"><h2>選手名一覧・編集</h2><button id="closePlayers">閉じる</button></div>
  <input id="playerSearch" type="text" placeholder="選手検索">
  <div class="row">
    <button data-roster="boys">男子</button><button data-roster="girls">女子</button>
    <button data-roster="all">全員</button><button id="clearSelected">選択解除</button>
  </div>
  <div class="players" id="players"></div>
  <h2>選手追加</h2>
  <div class="row"><input id="newPlayer" type="text" placeholder="選手名"><button id="addPlayer">追加</button></div>
</section>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="js/utils.js"></script>
<script src="js/recorder.js"></script>
<script src="js/video.js"></script>
<script src="js/draw.js"></script>
<script src="js/players.js"></script>
<script src="js/comments.js"></script>
<script src="js/scenes.js"></script>
<script src="js/voice.js"></script>
<script src="js/project.js"></script>
<script src="js/app.js"></script>
</body>
</html>
